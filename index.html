<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}

.container{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
    width:500px;
    max-width:95%;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

label{
    font-weight:bold;
    display:block;
    margin-bottom:6px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
}

input[type="color"]{
    height:50px;
    padding:4px;
    cursor:pointer;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#16a34a;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#15803d;
}

#canvas{
    margin-top:20px;
    text-align:center;
}

#canvas canvas{
    max-width:100%;
}

.download{
    margin-top:15px;
    background:#2563eb;
}
</style>
</head>
<body>

<div class="container">

    <h2>QR Code Generator</h2>

    <label>Link:</label>
    <input
        type="text"
        id="url"
        placeholder="https://seusite.com.br"
    >

    <label>Central Logo:</label>
    <input type="file" id="logo" accept="image/*">

    <label>QR Code Color:</label>
    <input type="color" id="qrColor" value="#000000">

    <button onclick="gerarQRCode()">
        Generate QR Code
    </button>

    <div id="canvas"></div>

    <button
        id="downloadBtn"
        class="download"
        style="display:none;"
        onclick="baixarQRCode()">
        Download PNG
    </button>

</div>

<script src="https://cdn.jsdelivr.net/npm/qr-code-styling/lib/qr-code-styling.js"></script>

<script>
let qrCode;

function gerarQRCode() {
    let url = document.getElementById("url").value.trim();
    const corSelecionada = document.getElementById("qrColor").value;

    if (!url) {
        alert("Informe um link.");
        return;
    }

    if (!url.startsWith("http://") && !url.startsWith("https://")) {
        url = "https://" + url;
    }

    const fileInput = document.getElementById("logo");

    document.getElementById("canvas").innerHTML = "";

    const criarQR = (imageUrl = null) => {

        qrCode = new QRCodeStyling({
            width: 350,
            height: 350,
            data: url,

            image: imageUrl,

            dotsOptions: {
                color: corSelecionada,
                type: "rounded"
            },

            cornersSquareOptions: {
                color: corSelecionada,
                type: "extra-rounded"
            },

            cornersDotOptions: {
                color: corSelecionada,
                type: "dot"
            },

            imageOptions: {
                crossOrigin: "anonymous",
                margin: 8,
                imageSize: 0.25
            },

            qrOptions: {
                errorCorrectionLevel: "H"
            },

            backgroundOptions: {
                color: "#ffffff"
            }
        });

        qrCode.append(document.getElementById("canvas"));
        document.getElementById("downloadBtn").style.display = "block";
    };

    if (fileInput.files.length > 0) {
        const reader = new FileReader();

        reader.onload = function(e) {
            criarQR(e.target.result);
        };

        reader.readAsDataURL(fileInput.files[0]);
    } else {
        criarQR();
    }
}

function baixarQRCode() {
    if(qrCode){
        qrCode.download({
            name: "qrcode",
            extension: "png"
        });
    }
}
</script>

</body>
</html>
